name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Databricks internal PyPI proxy (required — public PyPI is blocked)
  PIP_INDEX_URL: https://pypi.org/simple
  # Test env vars (no real credentials needed — tests mock everything)
  LAKEBASE_DNS: test-host
  LAKEBASE_DATABASE: test_db
  LAKEBASE_INSTANCE: test-instance

jobs:
  # ── TypeScript Check ──────────────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane-app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: control-plane-app/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Python Lint ───────────────────────────────────────────────
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --select E,F,W --ignore E501,E402

  # ── Python Tests ──────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - run: python -m pytest tests/backend/ -v --tb=short --cov=backend --cov-report=term-missing
      - name: Check coverage threshold
        run: python -m pytest tests/backend/ --cov=backend --cov-fail-under=25 -q

  # ── Secret Scanning ───────────────────────────────────────────
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          # Check for common secret patterns in tracked files
          FAIL=0

          # PATs (dapi prefix)
          if grep -rn "dapi[a-f0-9]\{30,\}" --include="*.py" --include="*.yaml" --include="*.yml" --include="*.sh" --include="*.json" --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv --exclude-dir=dist --exclude=".env" . 2>/dev/null; then
            echo "::error::Databricks PAT found in tracked files"
            FAIL=1
          fi

          # JWT tokens (exclude this workflow file which contains the pattern as a grep target)
          if grep -rn "eyJraWQ" --include="*.py" --include="*.yaml" --include="*.yml" --include="*.sh" --include="*.json" --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv --exclude-dir=dist --exclude-dir=.github --exclude=".env" . 2>/dev/null; then
            echo "::error::JWT token found in tracked files"
            FAIL=1
          fi

          # Hardcoded workspace-specific Lakebase DNS
          if grep -rn "instance-xxxx\|instance-xxxx" --include="*.py" --include="*.yaml" --include="*.yml" --include="*.sh" --include="*.json" --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv --exclude-dir=dist --exclude-dir=.github --exclude-dir=.databricks --exclude=".env" . 2>/dev/null; then
            echo "::error::Hardcoded Lakebase DNS found in tracked files"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "No secrets found."

  # ── Python Compile Check ──────────────────────────────────────
  compile:
    name: Python Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify all Python files compile
        run: |
          python -c "
          import py_compile, glob, sys
          errors = []
          for f in glob.glob('backend/**/*.py', recursive=True):
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          print(f'All {len(glob.glob(\"backend/**/*.py\", recursive=True))} Python files compile OK')
          "
