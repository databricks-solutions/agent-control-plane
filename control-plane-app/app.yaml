command:
  - "uvicorn"
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: LAKEBASE_DNS
    value: "instance-xxxx.database.cloud.databricks.com"
  - name: LAKEBASE_DATABASE
    value: "control_plane"
  - name: LAKEBASE_INSTANCE
    value: "ai-control-plane-db"
  - name: DATABRICKS_ACCOUNT_ID
    value: "0d26daa6-5e44-4c97-a497-ef015f91254a"

resources:
  - name: obo-auth
    description: "User authorization for OBO identity"
    permission: "all-apis"
