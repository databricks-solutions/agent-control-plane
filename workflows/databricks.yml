bundle:
  name: agent_discovery_workflow

variables:
  catalog:
    default: your_catalog
    description: Unity Catalog name for Delta tables
  schema:
    default: control_plane
    description: Schema name for Delta tables
  lakebase_dns:
    description: Lakebase PostgreSQL DNS hostname
  lakebase_database:
    default: control_plane
    description: Lakebase database name
  lakebase_instance:
    default: ""
    description: Lakebase instance name for Provisioned credential generation (leave empty for Autoscaling)
  lakebase_endpoint_path:
    default: ""
    description: Lakebase endpoint path for Autoscaling credential generation (e.g. projects/<name>/branches/<branch>/endpoints/<endpoint>). Leave empty for Provisioned.
  account_id:
    description: Databricks account ID for cross-workspace operations (find in your workspace URL or account console)
  warehouse_id:
    description: SQL warehouse ID for system table queries

resources:
  jobs:
    agent_discovery:
      name: "control-plane-agent-discovery"
      description: >
        Scheduled job that discovers all AI agents and MLflow observability
        data across workspaces, then syncs everything to Lakebase for the
        Control Plane dashboard.

      schedule:
        quartz_cron_expression: "0 0/30 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      tasks:
        - task_key: discover_agents
          description: "Discover agents from APIs + system tables → Delta table"
          notebook_task:
            notebook_path: ./01_discover_agents.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              delta_table: discovered_agents
          environment_key: default

        - task_key: discover_observability
          description: "Discover MLflow traces cross-workspace via SDK → Delta table"
          notebook_task:
            notebook_path: ./04_discover_observability.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              account_id: ${var.account_id}
              lakebase_dns: ${var.lakebase_dns}
              lakebase_database: ${var.lakebase_database}
              lakebase_instance: ${var.lakebase_instance}
              lakebase_endpoint_path: ${var.lakebase_endpoint_path}
          environment_key: default

        - task_key: discover_knowledge_bases
          description: "Discover Vector Search + Lakebase + billing costs → Delta"
          notebook_task:
            notebook_path: ./03_discover_knowledge_bases.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

        - task_key: discover_user_analytics
          description: "Query system.serving.endpoint_usage for user activity → Delta"
          notebook_task:
            notebook_path: ./05_discover_user_analytics.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

        - task_key: discover_gateway_usage
          description: "Query system.serving.endpoint_usage for AI Gateway usage → Delta"
          notebook_task:
            notebook_path: ./06_discover_gateway_usage.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

        - task_key: sync_to_lakebase
          description: "Sync all discovery data (Delta → Lakebase) + system table billing"
          depends_on:
            - task_key: discover_agents
            - task_key: discover_observability
            - task_key: discover_knowledge_bases
            - task_key: discover_user_analytics
            - task_key: discover_gateway_usage
          notebook_task:
            notebook_path: ./02_sync_to_lakebase.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              delta_table: discovered_agents
              lakebase_dns: ${var.lakebase_dns}
              lakebase_database: ${var.lakebase_database}
              lakebase_instance: ${var.lakebase_instance}
              lakebase_endpoint_path: ${var.lakebase_endpoint_path}
              account_id: ${var.account_id}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk
              - psycopg2-binary
              - requests

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      max_concurrent_runs: 1

      tags:
        project: ai-control-plane
        component: discovery

targets:
  # Copy and customize a target for your workspace.
  # See docs/installation.md for configuration details.
  # Set EITHER lakebase_endpoint_path (Autoscaling) OR lakebase_instance (Provisioned).
  dev:
    mode: development
    default: true
    variables:
      catalog: <your-catalog>                   # e.g. main, my_catalog
      schema: control_plane
      lakebase_dns: <your-lakebase-dns>         # e.g. ep-xxxx.database.cloud.databricks.com
      lakebase_endpoint_path: <your-endpoint>   # Autoscaling: projects/<name>/branches/<branch>/endpoints/<endpoint>
      lakebase_instance: ""                     # Provisioned only — leave empty for Autoscaling
      warehouse_id: <your-warehouse-id>         # SQL warehouse ID for system table queries
      account_id: <your-account-id>             # Databricks account ID

  prod:
    mode: development
    variables:
      catalog: <your-catalog>
      schema: control_plane
      lakebase_dns: <your-lakebase-dns>
      lakebase_endpoint_path: <your-endpoint>
      lakebase_instance: ""
      warehouse_id: <your-warehouse-id>
      account_id: <your-account-id>
