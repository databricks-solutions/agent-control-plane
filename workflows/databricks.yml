bundle:
  name: agent_discovery_workflow

variables:
  catalog:
    default: your_catalog
    description: Unity Catalog name for Delta tables
  schema:
    default: control_plane
    description: Schema name for Delta tables
  lakebase_dns:
    description: Lakebase PostgreSQL DNS hostname
  lakebase_database:
    default: control_plane
    description: Lakebase database name
  lakebase_instance:
    default: ""
    description: Lakebase instance name for Provisioned credential generation (leave empty for Autoscaling)
  lakebase_endpoint_path:
    default: ""
    description: Lakebase endpoint path for Autoscaling credential generation (e.g. projects/<name>/branches/<branch>/endpoints/<endpoint>). Leave empty for Provisioned.
  account_id:
    description: Databricks account ID for cross-workspace operations (find in your workspace URL or account console)
  warehouse_id:
    description: SQL warehouse ID for system table queries
  trace_retention_days:
    default: "90"
    description: "Time window (days) for trace detail caching. UI offers 7/14/30/90; this is the upper bound the discovery workflow caches."
  enable_cross_workspace_rest_fanout:
    default: "false"
    description: "Tier 3 prototype (parked). When 'true', the observability discovery task fans out MLflow REST calls across all workspaces using SP creds. Off by default — destination workspaces reject these calls today (HTTP 403 cert validation). Cross-workspace observability is served by UC SQL paths instead (Tier 2)."
  gateway_log_retention_days:
    default: "30"
    description: "Time window (days) for AI Gateway / inference-log payload caching."
  gateway_log_max_rows_per_table:
    default: "10000"
    description: "Per-source-table cap on rows pulled per inference-log discovery run."
  discovery_sp_secret_scope:
    default: ""
    description: "Databricks secret scope holding the discovery SP's OAuth creds (keys: client_id, client_secret). Empty disables SP-based cross-workspace auth."
  narrow_test_workspace_id:
    default: ""
    description: "If set, observability discovery only fans out to this single workspace_id. Use during SP rollout testing; leave empty for full fan-out."

resources:
  jobs:
    agent_discovery:
      name: "control-plane-agent-discovery"
      description: >
        Scheduled job that discovers all AI agents and MLflow observability
        data across workspaces, then syncs everything to Lakebase for the
        Control Plane dashboard.

      schedule:
        quartz_cron_expression: "0 0/30 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      tasks:
        - task_key: discover_agents
          description: "Discover agents from APIs + system tables → Delta table"
          notebook_task:
            notebook_path: ./01_discover_agents.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              delta_table: discovered_agents
          environment_key: default

        - task_key: discover_observability
          description: "Tier 1: discover local-workspace MLflow traces (default backend) via REST → Delta. Cross-workspace fan-out is parked (Tier 3); see enable_cross_workspace_rest_fanout."
          notebook_task:
            notebook_path: ./04_discover_observability.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              account_id: ${var.account_id}
              lakebase_dns: ${var.lakebase_dns}
              lakebase_database: ${var.lakebase_database}
              lakebase_instance: ${var.lakebase_instance}
              lakebase_endpoint_path: ${var.lakebase_endpoint_path}
              trace_retention_days: ${var.trace_retention_days}
              enable_cross_workspace_rest_fanout: ${var.enable_cross_workspace_rest_fanout}
              discovery_sp_secret_scope: ${var.discovery_sp_secret_scope}
              narrow_test_workspace_id: ${var.narrow_test_workspace_id}
          environment_key: default

        - task_key: discover_knowledge_bases
          description: "Discover Vector Search + Lakebase + billing costs → Delta"
          notebook_task:
            notebook_path: ./03_discover_knowledge_bases.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

        - task_key: discover_user_analytics
          description: "Query system.serving.endpoint_usage for user activity → Delta"
          notebook_task:
            notebook_path: ./05_discover_user_analytics.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

        - task_key: discover_gateway_usage
          description: "Query system.serving.endpoint_usage for AI Gateway usage → Delta"
          notebook_task:
            notebook_path: ./06_discover_gateway_usage.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

        - task_key: discover_uc_otel_traces
          description: "Discover UC-stored MLflow OTel traces account-wide via SQL (Tier 2b) → Delta"
          notebook_task:
            notebook_path: ./07_discover_uc_otel_traces.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              trace_retention_days: ${var.trace_retention_days}
          environment_key: default

        - task_key: discover_gateway_inference_logs
          description: "Discover AI Gateway / Model Serving inference-log payload tables account-wide via SQL (Tier 2a) → Delta"
          notebook_task:
            notebook_path: ./08_discover_gateway_inference_logs.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              retention_days: ${var.gateway_log_retention_days}
              max_rows_per_table: ${var.gateway_log_max_rows_per_table}
          environment_key: default

        - task_key: sync_to_lakebase
          description: "Sync all discovery data (Delta → Lakebase) + system table billing"
          depends_on:
            - task_key: discover_agents
            - task_key: discover_observability
            - task_key: discover_knowledge_bases
            - task_key: discover_user_analytics
            - task_key: discover_gateway_usage
            - task_key: discover_uc_otel_traces
            - task_key: discover_gateway_inference_logs
          notebook_task:
            notebook_path: ./02_sync_to_lakebase.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              delta_table: discovered_agents
              lakebase_dns: ${var.lakebase_dns}
              lakebase_database: ${var.lakebase_database}
              lakebase_instance: ${var.lakebase_instance}
              lakebase_endpoint_path: ${var.lakebase_endpoint_path}
              account_id: ${var.account_id}
              warehouse_id: ${var.warehouse_id}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk
              - psycopg2-binary
              - requests

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      max_concurrent_runs: 1

      tags:
        project: ai-control-plane
        component: discovery

targets:
  # Copy and customize a target for your workspace.
  # See docs/installation.md for configuration details.
  # Set EITHER lakebase_endpoint_path (Autoscaling) OR lakebase_instance (Provisioned).
  dev:
    mode: development
    default: true
    variables:
      catalog: <your-catalog>                   # e.g. main, my_catalog
      schema: control_plane
      lakebase_dns: <your-lakebase-dns>         # e.g. ep-xxxx.database.cloud.databricks.com
      lakebase_endpoint_path: <your-endpoint>   # Autoscaling: projects/<name>/branches/<branch>/endpoints/<endpoint>
      lakebase_instance: ""                     # Provisioned only — leave empty for Autoscaling
      warehouse_id: <your-warehouse-id>         # SQL warehouse ID for system table queries
      account_id: <your-account-id>             # Databricks account ID

  prod:
    mode: development
    variables:
      catalog: <your-catalog>
      schema: control_plane
      lakebase_dns: <your-lakebase-dns>
      lakebase_endpoint_path: <your-endpoint>
      lakebase_instance: ""
      warehouse_id: <your-warehouse-id>
      account_id: <your-account-id>
